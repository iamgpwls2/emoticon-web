services:
  backend:
    container_name: emoticon-web-backend
    build:
      context: ./backend
    working_dir: /workspace
    command: npm run dev
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      FRONTEND_ORIGIN: "http://localhost:5173"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/workspace
      - /workspace/node_modules

  frontend:
    container_name: emoticon-web-frontend  
    build:
      context: ./frontend
    working_dir: /workspace
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: "http://localhost:4000"
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/workspace
      - /workspace/node_modules
